<!DOCTYPE html>
<html>
<head>
    <title>Fantasy Bazaar</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }

        /* Tab styling */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
        }

        .tab-button {
            background: #16213e;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px 5px 0 0;
            transition: all 0.3s ease;
            color: white;
        }

            .tab-button:hover {
                background: #e94560;
            }

            .tab-button.active {
                background: #e94560;
                color: white;
            }

        .tab-content {
            display: none;
        }

            .tab-content.active {
                display: block;
            }

        .item {
            border: 1px solid #444;
            padding: 10px;
            margin: 10px;
            background: #16213e;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .in-stock {
            color: #4caf50;
        }

        .low-stock {
            color: #ff9800;
        }

        .out-of-stock {
            color: #f44336;
        }

        button {
            padding: 5px 10px;
            margin: 5px;
            cursor: pointer;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 3px;
        }

            button:hover {
                background: #ff6b6b;
            }

            button:disabled {
                background: #555;
                cursor: not-allowed;
            }

        .price {
            font-size: 1.2em;
            font-weight: bold;
            color: #ffd700;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .price-updated {
            animation: priceFlash 0.5s ease;
        }

        @keyframes priceFlash {
            0% {
                color: #ffd700;
                transform: scale(1);
            }

            50% {
                color: #ff6600;
                transform: scale(1.2);
            }

            100% {
                color: #ffd700;
                transform: scale(1);
            }
        }

        .stock-updated {
            animation: stockFlash 0.5s ease;
        }

        @keyframes stockFlash {
            0% {
                background-color: #16213e;
            }

            50% {
                background-color: #2a3f5e;
            }

            100% {
                background-color: #16213e;
            }
        }

        .status-badge {
            font-size: 0.8em;
            margin-left: 10px;
        }

        .event-banner {
            background: #e94560;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* NPC Activity Log styling */
        .activity-log {
            max-height: 600px;
            overflow-y: auto;
            background: #0f0f1a;
            border-radius: 5px;
            padding: 10px;
        }

        .log-entry {
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid;
            border-radius: 3px;
            font-size: 14px;
            font-family: monospace;
        }

        .log-success {
            background: rgba(76, 175, 80, 0.1);
            border-left-color: #4caf50;
        }

        .log-failure {
            background: rgba(244, 67, 54, 0.1);
            border-left-color: #f44336;
        }

        .log-attempt {
            background: rgba(255, 152, 0, 0.1);
            border-left-color: #ff9800;
        }

        .log-info {
            background: rgba(100, 100, 100, 0.1);
            border-left-color: #888;
        }

        .timestamp {
            color: #888;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .npc-name {
            font-weight: bold;
            color: #ffd700;
        }

        .clear-log-btn {
            background: #444;
            margin-bottom: 10px;
        }

            .clear-log-btn:hover {
                background: #666;
            }

        .npc-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 10px;
            background: #16213e;
            border-radius: 5px;
        }

        .stat {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
        }

        .buying {
            opacity: 0.6;
            cursor: wait;
        }
    </style>
</head>
<body>
    <h1>🏪 Fantasy Bazaar</h1>
    <div id="status">🟡 Connecting to real-time updates...</div>
    <div id="eventMessage"></div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-button active" onclick="switchTab('shop')">🏪 Shop</button>
        <button class="tab-button" onclick="switchTab('activity')">🤖 NPC Activity</button>
    </div>

    <!-- Shop Tab -->
    <div id="shop-tab" class="tab-content active">
        <div id="inventory"></div>
    </div>

    <!-- NPC Activity Tab -->
    <div id="activity-tab" class="tab-content">
        <div class="npc-stats">
            <div class="stat">
                <div class="stat-value" id="totalAttempts">0</div>
                <div class="stat-label">Total Attempts</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalSuccess">0</div>
                <div class="stat-label">Successful</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalFailures">0</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="successRate">0%</div>
                <div class="stat-label">Success Rate</div>
            </div>
        </div>
        <button class="clear-log-btn" onclick="clearActivityLog()">Clear Log</button>
        <div id="activityLog" class="activity-log">
            <div class="log-entry log-info">📋 Waiting for NPC activity...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script>
        let connection = null;

        // NPC Activity tracking
        let npcStats = {
            attempts: 0,
            successes: 0,
            failures: 0
        };

        let activityLogs = [];

        // Tab switching
        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update content visibility
            document.getElementById('shop-tab').classList.remove('active');
            document.getElementById('activity-tab').classList.remove('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        // Add NPC activity log entry
        function addActivityLog(npcName, action, details, type) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = {
                id: Date.now(),
                timestamp,
                npcName,
                action,
                details,
                type
            };

            activityLogs.unshift(logEntry); // Add to beginning (newest first)

            // Keep only last 100 logs
            if (activityLogs.length > 100) {
                activityLogs = activityLogs.slice(0, 100);
            }

            // Update stats
            if (type === 'success') {
                npcStats.successes++;
            } else if (type === 'failure') {
                npcStats.failures++;
            }
            npcStats.attempts++;

            updateActivityDisplay();
        }

        // Update activity log UI
        function updateActivityDisplay() {
            // Update stats
            document.getElementById('totalAttempts').textContent = npcStats.attempts;
            document.getElementById('totalSuccess').textContent = npcStats.successes;
            document.getElementById('totalFailures').textContent = npcStats.failures;
            const successRate = npcStats.attempts > 0 ? (npcStats.successes / npcStats.attempts * 100).toFixed(1) : 0;
            document.getElementById('successRate').textContent = `${successRate}%`;

            // Update log entries
            const logContainer = document.getElementById('activityLog');
            if (activityLogs.length === 0) {
                logContainer.innerHTML = '<div class="log-entry log-info">📋 Waiting for NPC activity...</div>';
                return;
            }

            logContainer.innerHTML = activityLogs.map(log => `
                                            <div class="log-entry log-${log.type}">
                                                <div class="timestamp">${log.timestamp}</div>
                                                <span class="npc-name">${log.npcName}</span><br />
                                                <strong>${log.action}</strong><br />
                                                <small style="color:#888">${log.details}</small>
                                            </div>
                                        `).join('');
        }

        // Clear activity log
        function clearActivityLog() {
            activityLogs = [];
            npcStats = { attempts: 0, successes: 0, failures: 0 };
            updateActivityDisplay();
        }

        // Update a single item in the UI without full refresh
        function updateItemInUI(itemId, itemName, newStock, newPrice) {
            const itemDivs = document.querySelectorAll('.item');
            itemDivs.forEach(div => {
                if (div.innerHTML.includes(itemName)) {
                    // Update stock badge
                    const stockBadge = div.querySelector('.status-badge');
                    if (stockBadge) {
                        if (newStock > 0) {
                            stockBadge.textContent = `${newStock} in stock`;
                            stockBadge.className = `status-badge ${newStock > 5 ? 'in-stock' : 'low-stock'}`;
                        } else {
                            stockBadge.textContent = 'SOLD OUT';
                            stockBadge.className = 'status-badge out-of-stock';
                        }
                    }

                    // Update price if provided
                    if (newPrice) {
                        const priceSpan = div.querySelector('.price');
                        if (priceSpan) {
                            priceSpan.innerHTML = `${newPrice} gold`;
                        }
                    }

                    // Update buy button
                    const buyButton = div.querySelector('button');
                    if (buyButton) {
                        buyButton.disabled = (newStock === 0);
                        buyButton.textContent = 'Buy 1';
                        buyButton.classList.remove('buying');
                    }

                    // Flash effect
                    div.classList.add('stock-updated');
                    setTimeout(() => div.classList.remove('stock-updated'), 500);
                }
            });
        }

        // Connect to SignalR (with fallback polling)
        function connectSignalR() {
            connection = new signalR.HubConnectionBuilder()
                .withUrl("/bazaarHub")
                .withAutomaticReconnect([0, 2000, 5000, 10000])
                .build();

            // Handle stock updates - update locally instead of full refresh
            connection.on("StockUpdated", (update) => {
                console.log("Stock update:", update);
                document.getElementById("status").innerHTML = "🟢 Live updates active";
                updateItemInUI(update.itemId, update.itemName, update.newStock, update.newPrice);
            });

            // Handle price updates
            connection.on("PriceUpdated", (update) => {
                console.log(`💰 Price update: ${update.itemName} - ${update.oldPrice} → ${update.newPrice} gold`);

                // Show temporary notification for significant price changes
                const priceChangePercent = ((update.newPrice - update.oldPrice) / update.oldPrice * 100).toFixed(1);
                if (Math.abs(priceChangePercent) > 10) {
                    showEventMessage(`💰 ${update.itemName} price ${priceChangePercent > 0 ? 'increased' : 'decreased'} by ${Math.abs(priceChangePercent)}%!`, priceChangePercent > 0 ? 'warning' : 'success');
                }

                // Find and update the price display for this item
                const itemDivs = document.querySelectorAll('.item');
                itemDivs.forEach(div => {
                    if (div.innerHTML.includes(update.itemName)) {
                        const priceSpan = div.querySelector('.price');
                        if (priceSpan) {
                            priceSpan.innerHTML = `${update.newPrice} gold`;
                            priceSpan.classList.add('price-updated');
                            setTimeout(() => priceSpan.classList.remove('price-updated'), 500);
                        }
                    }
                });
            });

            // Handle NPC activity updates
            connection.on("NpcActivity", (activity) => {
                console.log("NPC Activity:", activity);
                addActivityLog(activity.npcName, activity.action, activity.details, activity.type);
            });

            connection.start()
                .then(() => {
                    document.getElementById("status").innerHTML = "🟢 Live updates active";
                })
                .catch(err => {
                    console.warn("SignalR failed, falling back to polling:", err);
                    document.getElementById("status").innerHTML = "🟡 Real-time unavailable - polling every 10 seconds";
                    // Fallback to polling every 10 seconds (reduced frequency)
                    setInterval(loadInventory, 10000);
                });
        }

        // Show temporary event message
        function showEventMessage(message, type = 'info') {
            const eventDiv = document.getElementById("eventMessage");
            const colors = {
                success: '#4caf50',
                warning: '#ff9800',
                info: '#e94560'
            };
            eventDiv.innerHTML = `<div class="event-banner" style="background: ${colors[type]}">${message}</div>`;
            setTimeout(() => {
                eventDiv.innerHTML = '';
            }, 3000);
        }

        // Load inventory from API (only used for initial load and fallback)
        async function loadInventory() {
            try {
                const response = await fetch('/api/items');
                const items = await response.json();
                displayItems(items);
            } catch (err) {
                console.error("Failed to load inventory:", err);
                document.getElementById("inventory").innerHTML = "<p>❌ Failed to load inventory</p>";
            }
        }

        // Display items
        function displayItems(items) {
            const container = document.getElementById("inventory");
            container.innerHTML = items.map(item => `
                                            <div class="item" data-item-id="${item.id}" data-item-name="${item.name}">
                                                <strong>${item.name}</strong> ${item.isSpecial ? '✨' : ''}
                                                <span class="status-badge ${item.stock > 5 ? 'in-stock' : (item.stock > 0 ? 'low-stock' : 'out-of-stock')}">
                                                    ${item.stock > 0 ? `${item.stock} in stock` : 'SOLD OUT'}
                                                </span>
                                                <div class="price">${item.currentPrice} gold</div>
                                                <div>${item.description}</div>
                                                <button onclick="purchaseItem(${item.id}, '${item.name}')" ${item.stock === 0 ? 'disabled' : ''}>
                                                    Buy 1
                                                </button>
                                            </div>
                                        `).join('');
        }

        // Purchase item - updates UI instantly from response
        async function purchaseItem(itemId, itemName) {
            const button = event.target;
            button.disabled = true;
            button.textContent = 'Buying...';
            button.classList.add('buying');

            try {
                const response = await fetch('/api/purchase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ itemId: itemId, quantity: 1, buyerType: "User" })
                });

                const result = await response.json();

                if (response.ok) {
                    showEventMessage(`✅ Purchased ${result.itemName} for ${result.pricePaid} gold!`, 'success');
                    // Update UI instantly with the response data - NO full refresh!
                    updateItemInUI(result.itemId, result.itemName, result.remainingStock, result.pricePaid);
                } else {
                    showEventMessage(`❌ Purchase failed: ${result.title || result.message || 'Unknown error'}`, 'warning');
                    button.disabled = false;
                    button.textContent = 'Buy 1';
                    button.classList.remove('buying');
                }
            } catch (err) {
                console.error("Purchase failed:", err);
                showEventMessage("❌ Purchase failed - check console", 'warning');
                button.disabled = false;
                button.textContent = 'Buy 1';
                button.classList.remove('buying');
            }
        }

        // Start
        loadInventory();
        connectSignalR();
    </script>
</body>
</html>
